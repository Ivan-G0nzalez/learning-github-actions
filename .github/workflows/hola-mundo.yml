name: Aprendiendo GitHub Actions
run-name: ¡Aprendiendo GitHub Actions!
on: [push]

jobs:
  holamundo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Definir Variable
        run: echo "USERNAME=${{ github.actor }}" >> $GITHUB_ENV
      - name: Correr script
        run: python hello_word.py